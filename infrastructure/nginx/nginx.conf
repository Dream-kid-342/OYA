events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────
    log_format json '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
                    '"method":"$request_method","uri":"$request_uri",'
                    '"status":$status,"bytes":$body_bytes_sent,'
                    '"referer":"$http_referer","ua":"$http_user_agent",'
                    '"request_time":"$request_time"}';
    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 15M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ─── Rate Limiting ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ─── Gzip ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ─── Security headers (global) ────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── API Server ───────────────────────────────────────
    server {
        listen 80;
        server_name api.oyamicrocredit.co.ke;

        # Redirect HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.oyamicrocredit.co.ke;

        ssl_certificate /etc/letsencrypt/live/api.oyamicrocredit.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.oyamicrocredit.co.ke/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        limit_req zone=api burst=50 nodelay;
        limit_conn addr 20;

        location / {
            proxy_pass http://api-gateway:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # WebSocket support for Supabase Realtime
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Daraja callback — allow Safaricom IPs only (enforce at app layer too)
        location /payments/callback {
            proxy_pass http://api-gateway:3000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── Admin Dashboard ──────────────────────────────────
    server {
        listen 80;
        server_name admin.oyamicrocredit.co.ke;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name admin.oyamicrocredit.co.ke;

        ssl_certificate /etc/letsencrypt/live/admin.oyamicrocredit.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.oyamicrocredit.co.ke/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://admin-dashboard:80;
            proxy_set_header Host $host;
        }
    }
}
