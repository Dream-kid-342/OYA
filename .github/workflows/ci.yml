name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & TypeScript Check ──────────────────────────────
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint "services/*/src/**/*.ts" "packages/*/src/**/*.ts" --ext .ts --max-warnings=0

  # ─── Unit & Integration Tests ─────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: oya_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oya_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: dummy-test-secret-that-is-long-enough-for-tests
      NODE_ENV: test
      AT_API_KEY: test-key
      AT_USERNAME: sandbox
      AT_SENDER_ID: OYA
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_PRIVATE_KEY: '{"type":"service_account"}'
      FIREBASE_CLIENT_EMAIL: test@test.iam.gserviceaccount.com
      SENTRY_DSN: ""
      DARAJA_ENV: sandbox
      DARAJA_CONSUMER_KEY: test
      DARAJA_CONSUMER_SECRET: test
      DARAJA_BUSINESS_SHORT_CODE: "174379"
      DARAJA_PASSKEY: test
      DARAJA_CALLBACK_URL: http://localhost:3003/payments/callback
      DARAJA_ACCOUNT_REFERENCE: OYATest
      DARAJA_TRANSACTION_DESC: Test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w packages/database

      - name: Run database migrations
        run: npm run db:migrate -w packages/database

      - name: Build shared and database packages
        run: |
          npm run build -w packages/shared
          npm run build -w packages/database

      - name: Run tests (api-gateway)
        run: npm run test -w services/api-gateway -- --passWithNoTests
        continue-on-error: false

      - name: Run tests (auth-service)
        run: npm run test -w services/auth-service -- --passWithNoTests
        continue-on-error: false

      - name: Run tests (loan-service)
        run: npm run test -w services/loan-service -- --passWithNoTests
        continue-on-error: false

      - name: Run tests (payment-service)
        run: npm run test -w services/payment-service -- --passWithNoTests
        continue-on-error: false

      - name: Run tests (notification-service)
        run: npm run test -w services/notification-service -- --passWithNoTests
        continue-on-error: false

      - name: Run tests (queue-worker)
        run: npm run test -w services/queue-worker -- --passWithNoTests
        continue-on-error: false

      - name: Run tests (admin-dashboard)
        run: npm run test -w apps/admin-dashboard -- --passWithNoTests
        continue-on-error: false

  # ─── Security Scan ────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # Only scan for secrets on pull requests (where base != head)
      - name: Secret scanning (TruffleHog)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # ─── Docker Build ────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    strategy:
      matrix:
        service: [api-gateway, auth-service, loan-service, payment-service, notification-service, queue-worker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
